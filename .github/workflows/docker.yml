name: Docker

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test-gpu:
        type: boolean
        default: false
        description: |
          If true, also run tests for GPU images.
          False by default, because it requires GPU runners that cost money.

# automatically cancel in-progress builds if another commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# default to 0 permissions
# (job-level overrides add the minimal permissions needed)
permissions:
  contents: none

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          #config: ./docker/.hadolint.yaml
          recursive: true
  build-cpu:
    name: build (CPU)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: dockerfile-cli (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:cli \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/dockerfile-cli
      - name: dockerfile-cli (test)
        run: |
          docker run \
            --entrypoint="" \
            --rm \
            lightgbm:cli \
            which lightgbm
      - name: dockerfile-r (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:r \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/dockerfile-r
      - name: dockerfile-r (test)
        run: |
          docker run \
            --rm \
            lightgbm:r \
            Rscript -e "library(lightgbm); print(sessionInfo())"
      - name: dockerfile-python (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:python \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/dockerfile-python
      - name: dockerfile-python (test)
        run: |
          docker run \
            --rm \
            lightgbm:python \
            python -c "import lightgbm; print(f'lightgbm version: {lightgbm.__version__}')"
  build-gpu:
    name: build (GPU)
    runs-on: ${{ inputs.test-gpu && 'github-hosted-linux-gpu-amd64' || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: dockerfile.gpu (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:gpu \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/gpu/dockerfile.gpu
      - name: dockerfile.gpu (test)
        run: |
          docker run \
            --entrypoint="" \
            --rm \
            -t lightgbm:gpu \
            python -c "import lightgbm; print(f'lightgbm version: {lightgbm.__version__}')"
      - name: dockerfile-cli-only.gpu (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:cli-only.gpu \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/gpu/dockerfile-cli-only.gpu
      - name: dockerfile-cli-only.gpu (test)
        run: |
          docker run \
            --entrypoint="" \
            --rm \
            lightgbm:cli-only.gpu \
            which lightgbm
      - name: dockerfile-cli-only-distroless.gpu (build)
        env:
          LIGHTGBM_GIT_REF: ${{ github.head_ref }}
        run: |
          docker build \
            -t lightgbm:cli-only-distroless.gpu \
            --build-arg LIGHTGBM_GIT_REF="${LIGHTGBM_GIT_REF}" \
            --build-arg LIGHTGBM_GIT_URL=https://github.com/${{ github.repository }} \
            - < ./docker/gpu/dockerfile-cli-only-distroless.gpu
      - name: dockerfile-cli-only-distroless.gpu (test)
        if: ${{ inputs.test-gpu }}
        run: |
          docker run \
            --entrypoint="" \
            --rm \
            lightgbm:cli-only-distroless.gpu \
            which lightgbm
  all-docker-jobs-successful:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build-cpu
      - build-gpu
      - lint
    permissions:
      statuses: read
    steps:
      - name: Note that all tests succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
